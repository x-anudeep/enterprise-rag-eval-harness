name: rag-eval

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Evaluation gate
        run: rag-harness run-eval --docs data/raw --output reports/phase3_eval.json
