services:
  - type: web
    name: enterprise-rag-eval-harness
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: uvicorn enterprise_rag_eval.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
